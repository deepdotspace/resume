<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
    />
    <title>Resume — AI-powered LaTeX résumés</title>
    <meta
      name="description"
      content="Build a beautiful LaTeX résumé in your browser. Pick a template, edit with an AI assistant that tailors to the job description, compile to PDF in seconds."
    />

    <!-- Open Graph (Reddit / Facebook / LinkedIn / Slack / Discord unfurls) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Resume" />
    <meta property="og:title" content="Resume — AI-powered LaTeX résumés" />
    <meta
      property="og:description"
      content="Pick a template, edit with an AI assistant that tailors to the job description, compile to PDF in seconds."
    />
    <meta property="og:url" content="https://resume.app.space/" />
    <meta property="og:image" content="https://resume.app.space/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Resume dashboard — LaTeX résumé templates and an AI assistant" />

    <!-- Twitter Card (X/Twitter, also honored by some other crawlers) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Resume — AI-powered LaTeX résumés" />
    <meta
      name="twitter:description"
      content="Pick a template, edit with an AI assistant that tailors to the job description, compile to PDF in seconds."
    />
    <meta name="twitter:image" content="https://resume.app.space/og.png" />

    <link rel="canonical" href="https://resume.app.space/" />
    <script>
      // Apply the cached theme BEFORE React boots so there is no flash of
      // the wrong mode on reload or deep-link to any route. The key is
      // mirrored by `useThemeSync` in React-land — keep it in sync if
      // renamed. Default is `dark` (matches DEFAULT_SETTINGS.backgroundId).
      (function () {
        try {
          var t = localStorage.getItem('resume-theme')
          if (t === 'light') {
            document.documentElement.classList.remove('dark')
          } else {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
