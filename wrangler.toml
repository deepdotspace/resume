name = "resume-builder"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "worker.ts"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws/*", "/internal/*"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RecordRoom", "YjsRoom", "CanvasRoom", "MediaRoom", "PresenceRoom"]

[durable_objects]
bindings = [
  { name = "RECORD_ROOMS", class_name = "RecordRoom" },
  { name = "YJS_ROOMS", class_name = "YjsRoom" },
  { name = "CANVAS_ROOMS", class_name = "CanvasRoom" },
  { name = "MEDIA_ROOMS", class_name = "MediaRoom" },
  { name = "PRESENCE_ROOMS", class_name = "PresenceRoom" },
]

[[r2_buckets]]
binding = "FILES"
bucket_name = "resume-builder-files"

[vars]
APP_NAME = "resume-builder"

[dev]
port = 8780
inspector_port = 9237

# Secrets (set via `wrangler secret put` or written by `deepspace dev`):
#   AUTH_JWT_PUBLIC_KEY
#   AUTH_JWT_ISSUER
#   AUTH_WORKER_URL
#   OWNER_USER_ID
#   INTERNAL_STORAGE_HMAC_SECRET
