<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Resume">
  <defs>
    <!-- Navy tile matches the card surface / the existing favicon plate. -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#1a1f33" />
    </linearGradient>
    <!-- Indigo -> cyan accent matches the OG card and in-app wordmark dot. -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5b4fc" />
      <stop offset="1" stop-color="#67e8f9" />
    </linearGradient>
  </defs>

  <!-- Rounded plate. -->
  <rect width="64" height="64" rx="14" fill="url(#tile)" />

  <!-- Résumé sheet. -->
  <rect x="17" y="13" width="30" height="38" rx="3.5" fill="#f1f5f9" />

  <!-- Accent header bar (the "tailored" headline). -->
  <rect x="22" y="19" width="15" height="4" rx="2" fill="url(#accent)" />

  <!-- Body text lines. -->
  <rect x="22" y="28.5" width="20" height="2.6" rx="1.3" fill="#94a3b8" />
  <rect x="22" y="34.5" width="20" height="2.6" rx="1.3" fill="#cbd5e1" />
  <rect x="22" y="40.5" width="13" height="2.6" rx="1.3" fill="#cbd5e1" />

  <!-- AI-tailoring sparkle, overlapping the top-right corner. -->
  <path
    d="M45 12
       C45.8 16.4 47.6 18.2 52 19
       C47.6 19.8 45.8 21.6 45 26
       C44.2 21.6 42.4 19.8 38 19
       C42.4 18.2 44.2 16.4 45 12 Z"
    fill="url(#accent)"
  />
</svg>
